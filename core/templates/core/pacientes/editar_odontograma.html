{% extends "core/base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="title">Editar odontograma</h1>
    <p class="subtitle">
      Paciente: {{ item.paciente.nome }} • Dente: {{ item.dente }}
    </p>
  </div>

  <div class="header-actions">
    <a class="btn btn-ghost" href="{% url 'detalhes_paciente' item.paciente.pk %}">Voltar</a>
  </div>
</div>

<section class="card" style="max-width: 760px;">
  <h2 class="card-title">Atualizar dente {{ item.dente }}</h2>

  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Salvar alterações</button>
  </form>
</section>

{% endblock %}
