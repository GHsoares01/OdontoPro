{% extends "core/base.html" %}
{% block content %}

<div class="page-header">
    <h1>Deletar item do odontograma</h1>
    <a href="{% url 'detalhes_paciente' item.paciente.pk %}" class="btn btn-ghost">Voltar</a>
</div>

<div class="card" style="max-width: 700px;">
    <p>Tem certeza que deseja deletar este item do odontograma?</p>

    <p><strong>Paciente:</strong> {{ item.paciente.nome }}</p>
    <p><strong>Dente:</strong> {{ item.dente }}</p>
    <p><strong>Status:</strong> {{ item.get_status_display }}</p>

    <form method="post" style="margin-top:16px; display:flex; gap:10px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar Exclusão</button>
        <a href="{% url 'detalhes_paciente' item.paciente.pk %}" class="btn btn-ghost">Cancelar</a>
    </form>
</div>

{% endblock %}
